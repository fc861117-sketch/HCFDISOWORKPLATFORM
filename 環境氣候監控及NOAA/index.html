<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOAA 熱危害與體感溫度監控</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #03a9f4;
            --safe: #4caf50;
            --caution: #ffeb3b;
            --warning: #ff9800;
            --danger: #f44336;
            --extreme: #9c27b0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0 15px 50px 15px;
        }

        /* 置頂懸浮標題列 */
        .top-bar {
            position: sticky;
            top: 0;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 0 -15px 20px -15px;
            border-bottom: 1px solid #333;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .top-bar h1 { 
            margin: 0; 
            color: var(--accent-color); 
            font-size: 1.2rem; 
            text-align: left;
        }

        .reset-btn-top {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .reset-btn-top:active { background: #666; }

        h2 { font-size: 1.1rem; border-left: 5px solid var(--accent-color); padding-left: 10px; margin-top: 10px; margin-bottom: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* API 按鈕樣式 */
        .api-btn {
            width: 100%;
            background: rgba(3, 169, 244, 0.15);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .api-btn:active { background: rgba(3, 169, 244, 0.3); }
        .api-status { font-size: 0.85rem; color: #aaa; text-align: center; margin-bottom: 15px; min-height: 20px; }

        /* 滑桿樣式 */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 12px; font-weight: bold; font-size: 1.1rem; }
        input[type="range"] {
            width: 100%;
            height: 15px;
            border-radius: 5px;
            accent-color: var(--accent-color);
        }
        .value-display { float: right; color: var(--accent-color); font-size: 1.3rem; font-weight: bold; }

        /* 按鈕群組 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-radio {
            background: #333;
            border: 2px solid #444;
            color: white;
            padding: 12px 5px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-radio.active {
            border-color: var(--accent-color);
            background: rgba(3, 169, 244, 0.2);
        }

        /* 結果顯示 */
        .result-box {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            margin-top: 10px;
            transition: all 0.3s ease;
            color: black;
        }
        .result-temp { font-size: 2.5rem; font-weight: bold; line-height: 1.2; }
        .result-level { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
        
        /* 行動建議區 */
        .action-plan {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #ccc;
        }
        .action-plan strong { color: white; display: block; margin-bottom: 5px; font-size: 1rem; }

    </style>
</head>
<body>
    <!-- 呼叫導覽列 -->
    {% include nav.html %}
    
    <!-- 置頂懸浮列 -->
    <div class="top-bar">
        <h1>HCFD//熱危害監控 (NOAA)</h1>
        <button class="reset-btn-top" onclick="resetAll()">一鍵重置</button>
    </div>

    <!-- 環境參數輸入區 -->
    <div class="card">
        <h2>大氣環境觀測</h2>
        
        <!-- 自動獲取 API 區塊 -->
        <button class="api-btn" onclick="fetchLocalWeather()">
            <span>📍</span> 自動獲取當地溫濕度
        </button>
        <div id="api-status" class="api-status">未同步。請點擊上方按鈕獲取大氣背景值。</div>

        <div class="input-group">
            <label>乾球溫度 (Air Temp) <span id="temp-val" class="value-display">30.0°C</span></label>
            <input type="range" id="temp-range" min="20" max="50" step="0.5" value="30" oninput="calculateHeatIndex()">
        </div>
        <div class="input-group">
            <label>相對濕度 (Humidity) <span id="hum-val" class="value-display">70%</span></label>
            <input type="range" id="hum-range" min="10" max="100" value="70" oninput="calculateHeatIndex()">
        </div>
    </div>

    <!-- 消防裝備補償參數 -->
    <div class="card">
        <h2>作業服裝與裝備 (PPE 溫度補償)</h2>
        <div class="btn-grid" id="ppe-group">
            <div class="btn-radio active" onclick="setPPE(0, this)">一般勤務服<br><small>(+0°C)</small></div>
            <div class="btn-radio" onclick="setPPE(5, this)">化災/輕型防護<br><small>(+5°C)</small></div>
            <div class="btn-radio" onclick="setPPE(10, this)">全套消防衣<br><small>(+10°C)</small></div>
        </div>
    </div>

    <!-- 評估結果與決策建議 -->
    <div class="card">
        <h2>綜合體感溫度與決策</h2>
        <div id="result-box" class="result-box" style="background-color: var(--caution);">
            <div id="result-temp" class="result-temp">35°C</div>
            <div id="result-level" class="result-level">特別謹慎 (Extreme Caution)</div>
        </div>
        <div class="action-plan">
            <strong id="action-title">ISO 行動建議：</strong>
            <span id="action-text">強制執行輪替，確保冷卻站 (Rehab) 具備足夠遮蔭、水霧降溫設備，並監控人員心跳與脫水徵兆。</span>
        </div>
    </div>

    <script>
        let ppeOffset = 0;

        // --- API 獲取邏輯 ---
        function fetchLocalWeather() {
            const statusEl = document.getElementById('api-status');
            statusEl.innerText = "GPS 定位中...";
            statusEl.style.color = "var(--accent-color)";

            if (!navigator.geolocation) {
                statusEl.innerText = "您的瀏覽器或裝置不支援定位功能。";
                statusEl.style.color = "var(--danger)";
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                statusEl.innerText = `定位成功，正在取得氣象資料...`;

                try {
                    // 呼叫 Open-Meteo 免費氣象 API
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("API 回應錯誤");
                    
                    const data = await response.json();
                    const temp = data.current.temperature_2m;
                    const humidity = data.current.relative_humidity_2m;

                    // 將獲取的數據填入滑桿
                    document.getElementById('temp-range').value = temp;
                    document.getElementById('hum-range').value = humidity;
                    
                    calculateHeatIndex();

                    statusEl.innerText = `✅ 成功獲取環境背景值！請依火場周邊「小氣候」微調滑桿。`;
                    statusEl.style.color = "var(--safe)";

                } catch (error) {
                    statusEl.innerText = "氣象資料獲取失敗，請手動調整滑桿。";
                    statusEl.style.color = "var(--danger)";
                }

            }, (error) => {
                statusEl.innerText = "無法取得 GPS 權限，請確認瀏覽器定位已開啟，或手動調整滑桿。";
                statusEl.style.color = "var(--danger)";
            }, {
                enableHighAccuracy: false, // 不強求高精度以加快定位速度
                timeout: 10000,
                maximumAge: 0
            });
        }

        // --- 核心邏輯 ---
        function setPPE(offset, el) {
            ppeOffset = offset;
            const parent = el.parentElement;
            Array.from(parent.children).forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            calculateHeatIndex();
        }

        function calculateHeatIndex() {
            const tempC = parseFloat(document.getElementById('temp-range').value);
            const rh = parseFloat(document.getElementById('hum-range').value);
            
            document.getElementById('temp-val').innerText = tempC.toFixed(1) + '°C';
            document.getElementById('hum-val').innerText = Math.round(rh) + '%';

            let tempF = (tempC * 9 / 5) + 32;
            let hiF = tempF; 

            if (tempF >= 80) {
                hiF = -42.379 + 2.04901523 * tempF + 10.14333127 * rh 
                      - 0.22475541 * tempF * rh - 0.00683783 * tempF * tempF 
                      - 0.05481717 * rh * rh + 0.00122874 * tempF * tempF * rh 
                      + 0.00085282 * tempF * rh * rh - 0.00000199 * tempF * tempF * rh * rh;
            }

            let hiC = (hiF - 32) * 5 / 9;
            let finalHiC = Math.round(hiC + ppeOffset);

            updateResultUI(finalHiC);
        }

        function updateResultUI(temp) {
            const box = document.getElementById('result-box');
            const tDisplay = document.getElementById('result-temp');
            const lDisplay = document.getElementById('result-level');
            const actText = document.getElementById('action-text');

            tDisplay.innerText = temp + '°C';

            if (temp < 27) {
                box.style.backgroundColor = "var(--safe)";
                box.style.color = "white";
                lDisplay.innerText = "安全 / 一般監控 (Safe)";
                actText.innerText = "熱危害風險低。維持一般作業流程即可。";
            } else if (temp < 32) {
                box.style.backgroundColor = "var(--caution)";
                box.style.color = "black";
                lDisplay.innerText = "謹慎 (Caution)";
                actText.innerText = "提醒人員適時補充水分，長時間作業可能導致疲勞。";
            } else if (temp < 41) {
                box.style.backgroundColor = "var(--warning)";
                box.style.color = "black";
                lDisplay.innerText = "特別謹慎 (Extreme Caution)";
                actText.innerText = "建議實施作業輪替。若長時間作業可能引發熱痙攣或熱衰竭。需確保冷卻區 (Rehab) 運作。";
            } else if (temp < 54) {
                box.style.backgroundColor = "var(--danger)";
                box.style.color = "white";
                lDisplay.innerText = "危險 (Danger)";
                actText.innerText = "【高度中暑風險】應大幅縮短進入火場作業時間。強制進行生理監測 (心跳、體溫)，確實執行 10-15 分鐘的強制休息與降溫。";
            } else {
                box.style.backgroundColor = "var(--extreme)";
                box.style.color = "white";
                lDisplay.innerText = "極度危險 (Extreme Danger)";
                actText.innerText = "【立即中暑危險】強烈建議暫停所有非緊急的高體能消耗作業。若須救援人命，採最短時間輪替 (如 5-10 分鐘)。";
            }
        }

        function resetAll() {
            document.getElementById('temp-range').value = 30;
            document.getElementById('hum-range').value = 70;
            document.getElementById('api-status').innerText = "未同步。請點擊上方按鈕獲取大氣背景值。";
            document.getElementById('api-status').style.color = "#aaa";
            setPPE(0, document.getElementById('ppe-group').children[0]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            calculateHeatIndex();
        };
    </script>
</body>
</html>
