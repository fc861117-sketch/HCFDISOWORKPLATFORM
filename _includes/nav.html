<style>
    /* 全域設定 */
    :root {
        --hcfd-red: #e74c3c;
        --hcfd-yellow: #ffcc00;
        --dark-bg: #121212;
        --menu-bg: #1e1e1e;
    }

    /* 頂部導覽列容器 */
    .iso-header {
        background-color: var(--dark-bg);
        border-bottom: 3px solid var(--hcfd-yellow);
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* 網頁名稱標題 */
    .iso-title {
        color: #ffffff;
        font-size: 1.2rem;
        font-weight: bold;
        letter-spacing: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* 漢堡選單按鈕 */
    .menu-toggle {
        background: none;
        border: 2px solid var(--hcfd-yellow);
        border-radius: 4px;
        color: var(--hcfd-yellow);
        cursor: pointer;
        padding: 5px 10px;
        font-size: 1.2rem;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .menu-toggle:active {
        background-color: var(--hcfd-yellow);
        color: var(--dark-bg);
    }

    /* 側邊隱藏選單面板 */
    .side-menu {
        position: fixed;
        top: 0;
        right: -100%; /* 預設隱藏在右側 */
        width: 280px;
        height: 100%;
        background-color: var(--menu-bg);
        z-index: 1001;
        transition: 0.4s ease-in-out;
        box-shadow: -5px 0 15px rgba(0,0,0,0.7);
        padding-top: 60px;
        display: flex;
        flex-direction: column;
    }

    /* 選單顯示時的狀態 */
    .side-menu.active {
        right: 0;
    }

    /* 選單內的連結 */
    .side-menu a {
        color: #ffffff;
        text-decoration: none;
        padding: 20px 25px;
        font-size: 1.2rem;
        font-weight: bold;
        border-bottom: 1px solid #333;
        transition: 0.2s;
    }

    .side-menu a:hover, .side-menu a:active {
        background-color: var(--hcfd-yellow);
        color: var(--dark-bg);
    }

    /* 關閉按鈕（選單內） */
    .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        color: var(--hcfd-yellow);
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
    }

    /* 遮罩層（開啟選單時背景變暗） */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        display: none;
        z-index: 1000;
    }

    .overlay.active {
        display: block;
    }
</style>

<header class="iso-header">
    <div class="iso-title">竹縣消ISO作業平台</div>
    <button class="menu-toggle" onclick="toggleMenu()">
        <span>選單</span> ☰
    </button>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="side-menu" id="sideMenu">
    <button class="close-btn" onclick="toggleMenu()">✕</button>
    <a href="{{ site.baseurl }}/index.html">ISO作業平台</a>
    <a href="{{ site.baseurl }}/風險決策模型/index.html">風險決策模型</a>
    <a href="{{ site.baseurl }}/環境氣候監控及NOAA/index.html">環境氣候監控及NOAA</a>
</nav>

<script>
    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('active');
        overlay.classList.toggle('active');
    }
</script>
